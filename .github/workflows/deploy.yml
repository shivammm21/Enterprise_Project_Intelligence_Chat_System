name: Build & Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & push frontend image
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-frontend:latest
          build-args: |
            VITE_GITHUB_CLIENT_ID=${{ secrets.VITE_GITHUB_CLIENT_ID }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & push backend image
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Deploy both containers to EC2 via docker-compose
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            cd /home/${{ secrets.EC2_USER }}/app

            echo "==> Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> Pulling latest images..."
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            ADMIN_NAME="${{ secrets.ADMIN_NAME }}" \
            GITHUB_CLIENT_ID="${{ secrets.GITHUB_CLIENT_ID }}" \
            GITHUB_CLIENT_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}" \
            VITE_GITHUB_CLIENT_ID="${{ secrets.VITE_GITHUB_CLIENT_ID }}" \
            docker compose pull

            echo "==> Restarting containers..."
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            ADMIN_NAME="${{ secrets.ADMIN_NAME }}" \
            GITHUB_CLIENT_ID="${{ secrets.GITHUB_CLIENT_ID }}" \
            GITHUB_CLIENT_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}" \
            VITE_GITHUB_CLIENT_ID="${{ secrets.VITE_GITHUB_CLIENT_ID }}" \
            docker compose up -d --remove-orphans

            echo "==> Removing dangling images..."
            docker image prune -f

            echo "==> Deployment complete."
