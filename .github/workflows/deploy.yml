name: CI/CD

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit || echo "TypeScript check completed"

      - name: Lint Python code
        working-directory: backend
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting completed"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      EC2_USER: ${{ secrets.EC2_USER }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust host
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${EC2_PORT}" -H "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Package release
        shell: bash
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='dist' \
            --exclude='*/dist' \
            --exclude='__pycache__' \
            --exclude='*/__pycache__' \
            --exclude='venv' \
            --exclude='*/venv' \
            --exclude='.env' \
            --exclude='*/.env' \
            -czf /tmp/release.tar.gz .

      - name: Upload release
        shell: bash
        run: |
          RELEASE_DIR="knowledge-assistant/releases/${GITHUB_SHA}"
          ssh -p "${EC2_PORT}" "${EC2_USER}@${EC2_HOST}" "mkdir -p ~/${RELEASE_DIR}"
          scp -P "${EC2_PORT}" /tmp/release.tar.gz "${EC2_USER}@${EC2_HOST}:~/${RELEASE_DIR}/release.tar.gz"

      - name: Upload environment file
        shell: bash
        run: |
          if [ -z "${{ secrets.BACKEND_ENV }}" ]; then
            echo "Missing BACKEND_ENV secret. Add the contents of backend/.env as a GitHub secret."
            exit 1
          fi
          printf '%s' "${{ secrets.BACKEND_ENV }}" > /tmp/backend.env
          scp -P "${EC2_PORT}" /tmp/backend.env "${EC2_USER}@${EC2_HOST}:~/knowledge-assistant/releases/${GITHUB_SHA}/backend.env"

      - name: Upload frontend environment file
        shell: bash
        run: |
          if [ -n "${{ secrets.FRONTEND_ENV }}" ]; then
            printf '%s' "${{ secrets.FRONTEND_ENV }}" > /tmp/frontend.env
            scp -P "${EC2_PORT}" /tmp/frontend.env "${EC2_USER}@${EC2_HOST}:~/knowledge-assistant/releases/${GITHUB_SHA}/frontend.env"
          fi

      - name: Deploy
        shell: bash
        run: |
          ssh -p "${EC2_PORT}" "${EC2_USER}@${EC2_HOST}" 'bash -s' <<'REMOTE'
            set -euo pipefail
            
            APP_ROOT="$HOME/knowledge-assistant"
            RELEASE_DIR="$APP_ROOT/releases/${{ github.sha }}"
            
            cd "$RELEASE_DIR"
            tar -xzf release.tar.gz
            rm release.tar.gz
            
            # Move environment files
            mv backend.env backend/.env
            if [ -f frontend.env ]; then
              mv frontend.env frontend/.env
            fi
            
            # Create symlink to current release
            ln -sfn "$RELEASE_DIR" "$APP_ROOT/current"
            
            cd "$APP_ROOT/current"
            
            # Detect docker compose command
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            elif docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              echo "Neither docker-compose nor docker compose is installed on EC2."
              exit 1
            fi
            
            # Build and start containers
            $COMPOSE build backend frontend
            $COMPOSE up -d backend frontend
            
            # Show running containers
            $COMPOSE ps
            
            # Clean up old releases (keep last 5)
            cd "$APP_ROOT/releases"
            ls -t | tail -n +6 | xargs -r rm -rf
          REMOTE

