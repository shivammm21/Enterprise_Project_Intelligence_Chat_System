name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "frontend/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-frontend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & push Docker image to Docker Hub
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tags: sha-<short-commit> + "latest" on main/master
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass VITE_ build-time args from GitHub Secrets
          build-args: |
            VITE_GITHUB_CLIENT_ID=${{ secrets.VITE_GITHUB_CLIENT_ID }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Deploy to EC2 (runs only on push to main/master)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            echo "==> Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> Pulling latest frontend image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "==> Stopping and removing old container (if any)..."
            docker stop enterprise-frontend || true
            docker rm   enterprise-frontend || true

            echo "==> Starting new container..."
            docker run -d \
              --name enterprise-frontend \
              --restart unless-stopped \
              -p 80:80 \
              --network enterprise-net \
              ${{ env.IMAGE_NAME }}:latest

            echo "==> Removing dangling images..."
            docker image prune -f

            echo "==> Deployment complete."
